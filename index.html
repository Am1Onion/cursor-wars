<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cursor Wars</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; overflow: hidden; width: 100vw; height: 100vh; background: #fff; font-family: monospace; }
  body.in-game { cursor: none; }

  #overlay { position: fixed; inset: 0; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; z-index: 999; }
  #overlay input[type=text] { font-family: monospace; font-size: 14px; border: 1px solid #000; padding: 4px 6px; outline: none; width: 180px; }
  #overlay button { font-family: monospace; font-size: 14px; border: 1px solid #000; background: #fff; padding: 4px 12px; cursor: pointer; }
  #overlay button:hover { background: #000; color: #fff; }
  #name-error { font-family: monospace; font-size: 11px; color: #c0392b; min-height: 14px; }

  #color-row { display: flex; align-items: center; gap: 6px; }
  #color-row span { font-family: monospace; font-size: 12px; color: #666; }
  .color-swatch { width: 18px; height: 18px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; flex-shrink: 0; transition: transform 0.1s; }
  .color-swatch:hover { transform: scale(1.2); }
  .color-swatch.selected { border-color: #000; }

  #count { position: fixed; top: 8px; left: 8px; font-family: monospace; font-size: 12px; color: #999; z-index: 100; pointer-events: none; }

  #chat-hint { position: fixed; bottom: 52px; left: 50%; transform: translateX(-50%); font-family: monospace; font-size: 11px; color: #bbb; z-index: 100; pointer-events: none; opacity: 1; transition: opacity 1s; }

  #chatbar { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); display: none; flex-direction: column; align-items: stretch; gap: 0; font-family: monospace; font-size: 13px; border: 1px solid #000; background: #fff; z-index: 900; width: 320px; }
  #chat-history { max-height: 160px; overflow-y: auto; padding: 6px 8px; border-bottom: 1px solid #eee; display: flex; flex-direction: column; gap: 3px; }
  .chat-hist-msg { font-size: 11px; color: #333; }
  .chat-hist-msg .chat-who { font-weight: bold; }
  .chat-hist-msg .chat-time { color: #aaa; margin-left: 4px; font-size: 10px; }
  #chatbar-input-row { display: flex; align-items: center; gap: 4px; padding: 4px 8px; }
  #chatbar input { font-family: monospace; font-size: 13px; border: none; outline: none; flex: 1; }
  #chat-cooldown { font-size: 10px; color: #aaa; }

  .cursor { position: fixed; pointer-events: none; z-index: 500; transition: opacity 0.5s; }
  .cursor.idle { opacity: 0.3; }
  .cursor-name { position: absolute; top: 18px; left: 10px; font-family: monospace; font-size: 11px; white-space: nowrap; background: #000; color: #fff; padding: 1px 4px; }
  .cursor-bubble { position: absolute; bottom: 24px; left: 10px; font-family: monospace; font-size: 11px; white-space: nowrap; max-width: 180px; overflow: hidden; text-overflow: ellipsis; background: #fff; border: 1px solid #000; padding: 2px 6px; display: none; transition: opacity 0.4s; }
  .cursor-bubble.show { display: block; }

  #kick-warning { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); font-family: monospace; font-size: 12px; color: #c0392b; border: 1px solid #c0392b; background: #fff; padding: 4px 12px; z-index: 800; display: none; pointer-events: none; }

  #color-picker-btn { position: fixed; top: 8px; right: 8px; font-family: monospace; font-size: 11px; border: 1px solid #ccc; background: #fff; padding: 3px 8px; cursor: pointer; z-index: 200; display: none; align-items: center; gap: 6px; }
  #color-picker-btn:hover { border-color: #000; }
  #cpb-dot { width: 10px; height: 10px; border-radius: 50%; }
  #color-picker-panel { position: fixed; top: 34px; right: 8px; background: #fff; border: 1px solid #000; padding: 8px 10px; z-index: 300; display: none; flex-direction: column; gap: 8px; font-family: monospace; font-size: 11px; }
  #ig-swatches { display: flex; gap: 6px; flex-wrap: wrap; width: 132px; }
  .ig-swatch { width: 18px; height: 18px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: transform 0.1s; }
  .ig-swatch:hover { transform: scale(1.2); }
  .ig-swatch.selected { border-color: #000; }

  /* ── ripple ── */
  .ripple { position: fixed; border-radius: 50%; border: 2px solid; pointer-events: none; z-index: 490; animation: ripple-out 0.8s ease-out forwards; }
  @keyframes ripple-out { 0% { width: 0; height: 0; opacity: 0.8; margin: 0; } 100% { width: 120px; height: 120px; opacity: 0; margin: -60px; } }

  /* ── floating balls ── */
  .ball { position: fixed; border-radius: 50%; pointer-events: none; z-index: 200; transition: left 0.12s linear, top 0.12s linear; }

  /* ── draggable boxes ── */
  .dbox { position: fixed; z-index: 300; border: 1.5px solid #000; background: #81a3ff; font-family: monospace; font-size: 11px; padding: 8px 8px; cursor: grab; user-select: none; white-space: nowrap; }
  .dbox:active { cursor: grabbing; }
  .dbox.grabbed { border-style: dashed; opacity: 0.85; }

</style>
</head>

<head><link rel="icon" type="image/png" href="favicon.png"></head>
<body>

<div id="overlay">
  <div style="font-family:monospace;font-size:13px;">what's your name?</div>
  <input id="nameInput" type="text" maxlength="20" autocomplete="off" placeholder="name..." />
  <div id="name-error"></div>
  <div id="color-row"><span>color:</span></div>
  <button id="joinBtn">join</button>
</div>

<div id="count">0 online</div>
<div id="kick-warning">you've been idle — disconnecting in <span id="kick-countdown">30</span>s</div>
<div id="chat-hint" style="display:none;">press / to chat · click to ripple</div>

<div id="chatbar">
  <div id="chat-history"></div>
  <div id="chatbar-input-row">
    <span style="color:#999">/</span>
    <input id="chatInput" type="text" maxlength="80" placeholder="say something..." autocomplete="off" />
    <span id="chat-cooldown"></span>
    <span style="color:#999;font-size:11px;">↵ send</span>
  </div>
</div>

<div id="color-picker-btn"><div id="cpb-dot"></div>color</div>
<div id="color-picker-panel">
  <div style="color:#666;">cursor color</div>
  <div id="ig-swatches"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>

const firebaseConfig = {
  apiKey: "AIzaSyDFniinqSfTtpJaq9uM3ayXz-z8njAHTMg",
  authDomain: "cursor-wars-96326.firebaseapp.com",
  databaseURL: "https://cursor-wars-96326-default-rtdb.firebaseio.com",
  projectId: "cursor-wars-96326",
  storageBucket: "cursor-wars-96326.firebasestorage.app",
  messagingSenderId: "182917855465",
  appId: "1:182917855465:web:b7881211afc05549999878"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const BAD = ['fuck','shit','ass','bitch','cunt','dick','cock','pussy','bastard','damn','crap',
  'piss','whore','slut','fag','nigger','nigga','retard','twat','wank','bollocks','arse'];
function hasProfanity(s) {
  const low = s.toLowerCase().replace(/[^a-z]/g,'');
  return BAD.some(w => low.includes(w));
}

const COLORS = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c','#3498db','#9b59b6','#e91e63','#ffffff','#111111'];
let myColor = COLORS[5];

function strokeFor(c) { return c === '#ffffff' ? '#999' : '#fff'; }

const cursorSVG = (color) =>
  `<svg width="16" height="20" viewBox="0 0 16 20" xmlns="http://www.w3.org/2000/svg">
    <path d="M0 0 L0 16 L4 12 L7 19 L9 18 L6 11 L11 11 Z" fill="${color}" stroke="${strokeFor(color)}" stroke-width="1"/>
  </svg>`;

/* ── overlay swatches ── */
const colorRow = document.getElementById('color-row');
COLORS.forEach(c => {
  const sw = document.createElement('div');
  sw.className = 'color-swatch' + (c === myColor ? ' selected' : '');
  sw.style.background = c;
  if (c === '#ffffff') sw.style.outline = '1px solid #ccc';
  sw.addEventListener('click', () => {
    myColor = c;
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
    sw.classList.add('selected');
  });
  colorRow.appendChild(sw);
});

/* ── state ── */
let myId = null, myRef = null, myName = '', myCursorEl = null;
let myX = 0, myY = 0;
let chatOpen = false, chatTimeout = null, lastChatSent = 0;
const CHAT_COOLDOWN = 5000;
const others = {};
const THROTTLE = 40;
let lastSent = 0;
const chatMessages = [];

const overlay      = document.getElementById('overlay');
const nameInput    = document.getElementById('nameInput');
const nameError    = document.getElementById('name-error');
const chatbar      = document.getElementById('chatbar');
const chatInput    = document.getElementById('chatInput');
const countEl      = document.getElementById('count');
const chatHistEl   = document.getElementById('chat-history');
const chatCooldownEl = document.getElementById('chat-cooldown');
const chatHint     = document.getElementById('chat-hint');
const cpBtn        = document.getElementById('color-picker-btn');
const cpPanel      = document.getElementById('color-picker-panel');
const cpbDot       = document.getElementById('cpb-dot');
const igSwatches   = document.getElementById('ig-swatches');

/* ── in-game swatches ── */
function buildIgSwatches() {
  igSwatches.innerHTML = '';
  COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'ig-swatch' + (c === myColor ? ' selected' : '');
    sw.style.background = c;
    if (c === '#ffffff') sw.style.outline = '1px solid #ccc';
    sw.addEventListener('click', () => {
      myColor = c;
      if (myCursorEl) {
        const path = myCursorEl.querySelector('svg path');
        path.setAttribute('fill', myColor);
        path.setAttribute('stroke', strokeFor(myColor));
      }
      if (myRef) myRef.update({ color: myColor });
      cpbDot.style.background = myColor;
      igSwatches.querySelectorAll('.ig-swatch').forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
      cpPanel.style.display = 'none';
    });
    igSwatches.appendChild(sw);
  });
}

cpBtn.addEventListener('click', e => {
  e.stopPropagation();
  cpPanel.style.display = cpPanel.style.display === 'flex' ? 'none' : 'flex';
});
document.addEventListener('click', () => { cpPanel.style.display = 'none'; });
cpPanel.addEventListener('click', e => e.stopPropagation());

/* ── join ── */
async function join() {
  const raw = nameInput.value.trim();
  if (!raw) { nameInput.focus(); return; }
  if (hasProfanity(raw)) { nameError.textContent = 'name not allowed.'; return; }
  const safe = esc(raw).slice(0, 20);
  nameError.textContent = 'checking...';
  const snap = await db.ref('cursors').get();
  const taken = snap.exists() && Object.values(snap.val()).some(v => v.name && v.name.toLowerCase() === safe.toLowerCase());
  if (taken) { nameError.textContent = 'name already taken.'; return; }

  nameError.textContent = '';
  myName = safe;
  myId = db.ref().push().key;
  myRef = db.ref('cursors/' + myId);
  myRef.set({ name: myName, x: 0.5, y: 0.5, msg: '', ts: Date.now(), lastMove: Date.now(), color: myColor });
  myRef.onDisconnect().remove();

  overlay.style.display = 'none';
  document.body.classList.add('in-game');

  myCursorEl = makeCursorEl(myId, myName, myColor);
  document.body.appendChild(myCursorEl);

  cpBtn.style.display = 'flex';
  cpbDot.style.background = myColor;
  buildIgSwatches();

  chatHint.style.display = 'block';
  setTimeout(() => { chatHint.style.opacity = '0'; }, 8000);

  listenCursors();
  listenChat();
  listenRipples();
  listenBoxes();
  trackMouse();
  setupChat();
  setupClick();
  setupBoxes();
  scheduleIdleKick();
  initBalls();

  db.ref('cursors').on('value', s => {
    if (!s.exists()) { countEl.textContent = '0 online'; return; }
    const n = Object.values(s.val()).filter(v => v && v.name).length;
    countEl.textContent = n + ' online';
  });
}

function makeCursorEl(uid, name, color) {
  const el = document.createElement('div');
  el.className = 'cursor';
  el.id = 'c-' + uid;
  el.innerHTML = cursorSVG(color) +
    `<div class="cursor-name">${esc(name)}</div>` +
    `<div class="cursor-bubble"></div>`;
  return el;
}

const idleTimers = {};
function listenCursors() {
  db.ref('cursors').on('child_added', s => {
    if (s.key === myId) return;
    const d = s.val();
    const el = makeCursorEl(s.key, d.name, d.color || '#3498db');
    document.body.appendChild(el);
    others[s.key] = { el, bt: null, x: d.x || 0.5, y: d.y || 0.5 };
    move(el, d.x, d.y);
    if (d.msg) showBubble(s.key, d.msg);
    scheduleIdle(s.key, d.lastMove || d.ts);
  });
  db.ref('cursors').on('child_changed', s => {
    if (s.key === myId) return;
    const d = s.val();
    if (!others[s.key]) {
      const el = makeCursorEl(s.key, d.name, d.color || '#3498db');
      document.body.appendChild(el);
      others[s.key] = { el, bt: null, x: d.x || 0.5, y: d.y || 0.5 };
    }
    others[s.key].x = d.x || 0.5;
    others[s.key].y = d.y || 0.5;
    const path = others[s.key].el.querySelector('svg path');
    const c = d.color || '#3498db';
    path.setAttribute('fill', c);
    path.setAttribute('stroke', strokeFor(c));
    move(others[s.key].el, d.x, d.y);
    others[s.key].el.classList.remove('idle');
    if (d.msg !== undefined) updateBubbleProximity(s.key, d.msg);
    scheduleIdle(s.key, d.lastMove || d.ts);
  });
  db.ref('cursors').on('child_removed', s => {
    if (others[s.key]) { others[s.key].el.remove(); delete others[s.key]; }
    if (idleTimers[s.key]) { clearTimeout(idleTimers[s.key]); delete idleTimers[s.key]; }
  });
}

function scheduleIdle(uid, lastMove) {
  if (idleTimers[uid]) clearTimeout(idleTimers[uid]);
  const elapsed = Date.now() - lastMove;
  const remaining = Math.max(0, 30000 - elapsed);
  idleTimers[uid] = setTimeout(() => {
    if (others[uid]) others[uid].el.classList.add('idle');
  }, remaining);
}

function move(el, nx, ny) {
  el.style.left = (nx * window.innerWidth) + 'px';
  el.style.top = (ny * window.innerHeight) + 'px';
}

/* ── proximity bubble ── */
const BUBBLE_MAX_DIST = 200;

function dist(uid) {
  const o = others[uid];
  if (!o) return Infinity;
  const ox = o.x * window.innerWidth;
  const oy = o.y * window.innerHeight;
  return Math.hypot(ox - myX, oy - myY);
}

function updateBubbleProximity(uid, msg) {
  const entry = others[uid];
  if (!entry) return;
  const bubble = entry.el.querySelector('.cursor-bubble');
  if (!msg) { bubble.classList.remove('show'); return; }
  const d = dist(uid);
  const visible = d < BUBBLE_MAX_DIST;
  bubble.textContent = msg;
  bubble.style.opacity = visible ? Math.max(0.2, 1 - d / BUBBLE_MAX_DIST).toFixed(2) : '0';
  if (visible) {
    bubble.classList.add('show');
    if (entry.bt) clearTimeout(entry.bt);
    entry.bt = setTimeout(() => bubble.classList.remove('show'), 6000);
  } else {
    bubble.classList.remove('show');
  }
}

/* recalculate all bubble visibilities when I move */
function refreshAllBubbles() {
  Object.keys(others).forEach(uid => {
    const entry = others[uid];
    if (!entry) return;
    const bubble = entry.el.querySelector('.cursor-bubble');
    if (!bubble.textContent) return;
    updateBubbleProximity(uid, bubble.textContent);
  });
}

function showBubble(uid, msg) {
  updateBubbleProximity(uid, msg);
}

/* ── idle kick ── */
const IDLE_WARN = 2.5 * 60 * 1000;
let kickWarnTimer = null, kickTimer = null, kickCountdownInterval = null;
const kickWarningEl = document.getElementById('kick-warning');
const kickCountdownEl = document.getElementById('kick-countdown');

function resetIdleKick() {
  kickWarningEl.style.display = 'none';
  if (kickWarnTimer) { clearTimeout(kickWarnTimer); kickWarnTimer = null; }
  if (kickTimer) { clearTimeout(kickTimer); kickTimer = null; }
  if (kickCountdownInterval) { clearInterval(kickCountdownInterval); kickCountdownInterval = null; }
  scheduleIdleKick();
}

function scheduleIdleKick() {
  kickWarnTimer = setTimeout(() => {
    kickWarningEl.style.display = 'block';
    let secs = 30;
    kickCountdownEl.textContent = secs;
    kickCountdownInterval = setInterval(() => {
      secs--;
      kickCountdownEl.textContent = secs;
      if (secs <= 0) clearInterval(kickCountdownInterval);
    }, 1000);
    kickTimer = setTimeout(() => kickPlayer(), 30000);
  }, IDLE_WARN);
}

function kickPlayer() {
  if (myRef) myRef.remove();
  document.body.classList.remove('in-game');
  document.body.innerHTML = '<div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-family:monospace;font-size:13px;background:#fff;flex-direction:column;gap:8px;">you were kicked for being idle.<br><br><a href="" style="color:#000">rejoin</a></div>';
}

function trackMouse() {
  document.addEventListener('mousemove', e => {
    resetIdleKick();
    myX = e.clientX;
    myY = e.clientY;
    if (myCursorEl) {
      myCursorEl.style.left = e.clientX + 'px';
      myCursorEl.style.top = e.clientY + 'px';
    }
    refreshAllBubbles();
    const now = Date.now();
    if (now - lastSent < THROTTLE) return;
    lastSent = now;
    myRef.update({ x: e.clientX / window.innerWidth, y: e.clientY / window.innerHeight, lastMove: now });
  });
}

/* ── RIPPLE feature ── */
function setupClick() {
  document.addEventListener('click', e => {
    if (!myId) return;
    if (chatOpen) return;
    spawnRipple(e.clientX, e.clientY, myColor);
    db.ref('ripples').push({
      x: e.clientX / window.innerWidth,
      y: e.clientY / window.innerHeight,
      color: myColor,
      ts: Date.now()
    });
    db.ref('ripples').orderByChild('ts').endAt(Date.now() - 5000).limitToFirst(50).get().then(snap => {
      if (snap.exists()) snap.forEach(c => c.ref.remove());
    });
  });
}

function spawnRipple(cx, cy, color) {
  const el = document.createElement('div');
  el.className = 'ripple';
  el.style.left = cx + 'px';
  el.style.top = cy + 'px';
  el.style.borderColor = color === '#ffffff' ? '#ccc' : color;
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

function listenRipples() {
  db.ref('ripples').on('child_added', s => {
    const d = s.val();
    if (Date.now() - d.ts > 2000) return;
    spawnRipple(d.x * window.innerWidth, d.y * window.innerHeight, d.color);
  });
}

/* ── FLOATING BALLS feature ── */
const BALL_COUNT = 5;
const BALL_COLORS = ['#e74c3c','#f1c40f','#2ecc71','#3498db','#9b59b6'];
const BALL_SIZES  = [28, 20, 24, 18, 22];
const ballEls = {};
let amBallMaster = false;
let ballPhysics = {};

function initBalls() {
  db.ref('balls').get().then(snap => {
    if (!snap.exists()) {
      amBallMaster = true;
      const init = {};
      for (let i = 0; i < BALL_COUNT; i++) {
        init[i] = {
          x: 0.1 + Math.random() * 0.8,
          y: 0.1 + Math.random() * 0.8,
          vx: (Math.random() - 0.5) * 0.003,
          vy: (Math.random() - 0.5) * 0.003
        };
        ballPhysics[i] = { ...init[i] };
      }
      db.ref('balls').set(init);
    }
  });

  for (let i = 0; i < BALL_COUNT; i++) {
    const el = document.createElement('div');
    el.className = 'ball';
    const sz = BALL_SIZES[i];
    el.style.width = sz + 'px';
    el.style.height = sz + 'px';
    el.style.background = BALL_COLORS[i];
    el.style.opacity = '0.55';
    el.style.left = '50%';
    el.style.top = '50%';
    document.body.appendChild(el);
    ballEls[i] = el;
  }

  db.ref('balls').on('child_changed', s => {
    const i = s.key;
    const d = s.val();
    const el = ballEls[i];
    if (!el) return;
    const sz = BALL_SIZES[i];
    el.style.left = (d.x * window.innerWidth - sz/2) + 'px';
    el.style.top  = (d.y * window.innerHeight - sz/2) + 'px';
    if (amBallMaster) ballPhysics[i] = { ...d };
  });

  db.ref('balls').on('child_added', s => {
    const i = s.key;
    const d = s.val();
    const el = ballEls[i];
    if (!el) return;
    const sz = BALL_SIZES[i];
    el.style.left = (d.x * window.innerWidth - sz/2) + 'px';
    el.style.top  = (d.y * window.innerHeight - sz/2) + 'px';
    ballPhysics[i] = { ...d };
  });

  db.ref('.info/connected').on('value', snap => {
    if (!snap.val()) return;
    db.ref('ballmaster').transaction(cur => {
      if (!cur) { amBallMaster = true; return myId; }
      return undefined;
    }, (err, committed) => {
      if (committed) {
        amBallMaster = true;
        db.ref('ballmaster').onDisconnect().remove();
        runBallPhysics();
      }
    });
  });
}

function runBallPhysics() {
  if (!amBallMaster) return;
  setInterval(() => {
    const W = window.innerWidth, H = window.innerHeight;
    const updates = {};
    for (let i = 0; i < BALL_COUNT; i++) {
      const b = ballPhysics[i];
      if (!b) continue;
      b.x += b.vx;
      b.y += b.vy;
      if (b.x < 0.03 || b.x > 0.97) b.vx *= -1;
      if (b.y < 0.03 || b.y > 0.97) b.vy *= -1;
      b.x = Math.max(0.03, Math.min(0.97, b.x));
      b.y = Math.max(0.03, Math.min(0.97, b.y));
      updates[i] = { x: b.x, y: b.y, vx: b.vx, vy: b.vy };
      const sz = BALL_SIZES[i];
      ballEls[i].style.left = (b.x * W - sz/2) + 'px';
      ballEls[i].style.top  = (b.y * H - sz/2) + 'px';
    }
    db.ref('balls').update(updates);
  }, 80);
}

/* ── DRAGGABLE BOXES feature ── */
const BOX_LABELS = ['📦 crate A','📦 crate B','🪨 rock','🌀 thing','💾 data'];
const BOX_COLORS = ['#fff','#fff4e6','#e8f5e9','#e3f2fd','#fce4ec'];
let dragState = null;

function setupBoxes() {
  db.ref('boxes').get().then(snap => {
    if (!snap.exists()) {
      const init = {};
      BOX_LABELS.forEach((lbl, i) => {
        init[i] = {
          label: lbl,
          x: 0.1 + (i * 0.18),
          y: 0.15 + (i % 2) * 0.08,
          bg: BOX_COLORS[i],
          grabbedBy: null
        };
      });
      db.ref('boxes').set(init);
    }
  });
}

function listenBoxes() {
  db.ref('boxes').on('child_added', s => renderBox(s.key, s.val()));
  db.ref('boxes').on('child_changed', s => renderBox(s.key, s.val()));
}

function renderBox(key, d) {
  let el = document.getElementById('box-' + key);
  if (!el) {
    el = document.createElement('div');
    el.className = 'dbox';
    el.id = 'box-' + key;
    el.addEventListener('mousedown', e => startDrag(e, key));
    document.body.appendChild(el);
  }
  el.textContent = d.label;
  el.style.background = d.bg || '#fff';
  el.style.left = (d.x * window.innerWidth) + 'px';
  el.style.top  = (d.y * window.innerHeight) + 'px';
  if (d.grabbedBy && d.grabbedBy !== myId) {
    el.classList.add('grabbed');
    el.style.cursor = 'not-allowed';
  } else if (!d.grabbedBy) {
    el.classList.remove('grabbed');
    el.style.cursor = 'grab';
  }
}

function startDrag(e, key) {
  if (dragState) return;
  e.stopPropagation();
  const el = document.getElementById('box-' + key);
  const rect = el.getBoundingClientRect();
  const offX = e.clientX - rect.left;
  const offY = e.clientY - rect.top;
  db.ref('boxes/' + key).transaction(d => {
    if (d && d.grabbedBy && d.grabbedBy !== myId) return;
    if (d) d.grabbedBy = myId;
    return d;
  }, (err, committed) => {
    if (!committed) return;
    dragState = { key, offX, offY };
    el.style.cursor = 'grabbing';
    db.ref('boxes/' + key + '/grabbedBy').onDisconnect().set(null);
  });
}

document.addEventListener('mousemove', e => {
  if (!dragState) return;
  const { key, offX, offY } = dragState;
  const nx = (e.clientX - offX) / window.innerWidth;
  const ny = (e.clientY - offY) / window.innerHeight;
  db.ref('boxes/' + key).update({ x: Math.max(0, Math.min(0.95, nx)), y: Math.max(0, Math.min(0.92, ny)) });
});

document.addEventListener('mouseup', () => {
  if (!dragState) return;
  const key = dragState.key;
  dragState = null;
  db.ref('boxes/' + key).update({ grabbedBy: null });
  const el = document.getElementById('box-' + key);
  if (el) { el.classList.remove('grabbed'); el.style.cursor = 'grab'; }
});

/* ── chat ── */
function listenChat() {
  db.ref('chat').limitToLast(20).on('child_added', s => {
    const d = s.val();
    chatMessages.push(d);
    if (chatMessages.length > 20) chatMessages.shift();
    renderChatHistory();
  });
}

function renderChatHistory() {
  chatHistEl.innerHTML = '';
  chatMessages.forEach(m => {
    const div = document.createElement('div');
    div.className = 'chat-hist-msg';
    const t = new Date(m.ts);
    const timeStr = t.getHours().toString().padStart(2,'0') + ':' + t.getMinutes().toString().padStart(2,'0');
    const nameColor = (m.color === '#ffffff' || m.color === '#f1c40f') ? '#888' : esc(m.color);
    div.innerHTML = `<span class="chat-who" style="color:${nameColor}">${esc(m.name)}</span><span class="chat-time">${timeStr}</span> ${esc(m.text)}`;
    chatHistEl.appendChild(div);
  });
  chatHistEl.scrollTop = chatHistEl.scrollHeight;
}

function setupChat() {
  document.addEventListener('keydown', e => {
    if (overlay.style.display !== 'none') return;
    if (e.key === '/' && !chatOpen) { e.preventDefault(); openChat(); }
    if (e.key === 'Escape' && chatOpen) closeChat();
  });
  chatInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') sendChat();
    if (e.key === 'Escape') closeChat();
    e.stopPropagation();
  });
}

function openChat() {
  chatOpen = true;
  chatbar.style.display = 'flex';
  renderChatHistory();
  chatHistEl.scrollTop = chatHistEl.scrollHeight;
  setTimeout(() => chatInput.focus(), 20);
  chatHint.style.display = 'none';
}

function closeChat() {
  chatOpen = false;
  chatbar.style.display = 'none';
  chatInput.value = '';
  chatInput.blur();
}

function sendChat() {
  const msg = chatInput.value.trim();
  if (!msg) { closeChat(); return; }

  if (hasProfanity(msg)) {
    chatInput.value = '';
    chatInput.placeholder = 'keep it clean!';
    setTimeout(() => chatInput.placeholder = 'say something...', 2000);
    return;
  }

  const now = Date.now();
  if (now - lastChatSent < CHAT_COOLDOWN) {
    const wait = Math.ceil((CHAT_COOLDOWN - (now - lastChatSent)) / 1000);
    chatCooldownEl.textContent = `wait ${wait}s`;
    setTimeout(() => chatCooldownEl.textContent = '', 1200);
    return;
  }
  lastChatSent = now;
  resetIdleKick();

  const bubble = myCursorEl.querySelector('.cursor-bubble');
  bubble.textContent = msg;
  bubble.classList.add('show');
  if (chatTimeout) clearTimeout(chatTimeout);
  chatTimeout = setTimeout(() => { bubble.classList.remove('show'); myRef.update({ msg: '' }); }, 6000);
  myRef.update({ msg, ts: now });
  db.ref('chat').push({ name: myName, text: msg, ts: now, color: myColor });

  closeChat();
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('joinBtn').addEventListener('click', join);
nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') join(); });
setTimeout(() => nameInput.focus(), 50);
</script>
